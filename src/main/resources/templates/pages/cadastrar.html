<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro temporário | Kofi</title>
</head>
<body>

<h1>Kofi Ctrl - Cadastro de Usuário</h1>
<p><strong>Atenção:</strong> Página temporária para testes</p>

<hr>

<form th:action="@{/cadastrar}" method="post">

    <fieldset>
        <legend>Dados do Usuário</legend>

        <p>
            <label for="nome">Nome completo: *</label><br>
            <input type="text" id="nome" name="nome" required maxlength="100">
        </p>

        <p>
            <label for="email">E-mail: *</label><br>
            <input type="email" id="email" name="email" required maxlength="150">
        </p>

        <p>
            <label for="senha">Senha: *</label><br>
            <input type="password" id="senha" name="senha" required minlength="6">
        </p>

        <p>
            <label for="papel">Perfil de acesso: *</label><br>
            <select id="papel" name="papel" required>
                <option value="">-- Selecione --</option>
                <option value="ADMIN">Administrador</option>
                <option value="ATENDENTE">Atendente</option>
                <option value="COZINHA">Cozinha</option>
            </select>
        </p>

    </fieldset>

    <br>

    <input type="submit" value="Cadastrar usuário">
    <input type="reset" value="Limpar campos">

</form>

<hr>

<p><a href="/login">Voltar para o login</a></p>

</body>
</html>
