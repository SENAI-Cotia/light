<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:insert="~{fragments/head :: common-head('Kofi Ctrl | Dashboard')}"></th:block>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<aside>
    <div th:replace="~{fragments/navbar :: menu-toggle}"></div>

    <div th:replace="~{fragments/navbar :: navbar('dashboard')}"></div>
</aside>

<main class="dashboard-main">
    <th:block th:insert="~{fragments/header:: header('coffee-bean-dark', 'DASHBOARD')}"></th:block>

    <div class="dash-header">

        <div class="revenue-card">
            <div class="icon">
                <img th:src="@{/assets/images/coffee-pot.svg}" alt="">
            </div>
            <div class="monthly-content">
                <div class="total-earned">
                    <h2>Total faturado</h2>
                    <p>mês: abril</p>
                    <h3>R$1.200,00</h3>
                </div>
                <div class="ticket-container">
                    <div class="average-ticket">
                        <p>ticket médio</p>
                        <p>R$79,00</p>
                    </div>
                    <div class="highest-ticket">
                        <p>maior pedido</p>
                        <p>R$109,00</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="dish-status">
            <div class="late-dishes">
                <p>Pratos em atraso</p>
                <div class="quantity">
                    <p>11</p>
                    <img th:src="@{/assets/icons/cup.svg}" alt="">
                </div>
            </div>
            <div class="in-prepare"><p>Pratos em preparo</p>
                <div class="quantity">
                    <p>7</p>
                    <img th:src="@{/assets/icons/dish.svg}" alt="">
                </div>
            </div>
        </div>

        <div class="orders-graph">
            <canvas id="kofiChart"></canvas>
        </div>
    </div>

    <div class="orders-list"></div>

    <div class="orders-info"></div>
</main>

</body>

<script>
    Chart.defaults.font.family = "'Nunito Sans', sans-serif";

    new Chart(document.getElementById('kofiChart'), {
        type: 'line',
        data: {
            labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul','Ago', 'Set', 'Out', 'Nov', 'Dez'],
            datasets: [{
                label: 'Vendas mensais',
                data: [12, 19, 3, 5, 2, 70, 8, 5, 0, 56, 25, 60],
                borderColor: '#41210A',
                borderWidth: 3,
                pointRadius: 1,
                pointHoverRadius: 0,
                tension: 0.4,
                fill: true,
                backgroundColor: '#F1EADA'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: '#3b2a1a',
                    titleColor: '#f5ede0',
                    bodyColor: '#f5ede0',
                    padding: 10,
                    cornerRadius: 6,
                    displayColors: false
                },
                title: {
                    display: true,
                    text: 'Quantidade de pedidos',
                    color: '#3b2a1a',
                    font: {
                        size: 16,
                        weight: 'regular'
                    },
                    padding: {
                        top: 10,
                        bottom: 20
                    }
                }
            },
            scales: {
                x: {
                    grid: { color: 'rgba(59,42,26,0.12)', lineWidth: 1 },
                    border: { display: false },
                    ticks: { color: '#3b2a1a', font: { size: 16 } }
                },
                y: {
                    grid: { color: 'rgba(59,42,26,0.12)', lineWidth: 1 },
                    border: { display: false },
                    ticks: { color: '#3b2a1a', font: { size: 16 }, stepSize: 5 },
                    beginAtZero: false
                }
            }
        }
    });
</script>


</html>
