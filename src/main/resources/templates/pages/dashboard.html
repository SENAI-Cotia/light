<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:insert="~{fragments/head :: common-head('Kofi Ctrl | Dashboard')}"></th:block>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<aside>
    <div th:replace="~{fragments/navbar :: menu-toggle}"></div>

    <div th:replace="~{fragments/navbar :: navbar('dashboard')}"></div>
</aside>

<main class="dashboard-main">
    <th:block th:insert="~{fragments/header:: header('coffee-bean-dark', 'DASHBOARD')}"></th:block>

    <div class="revenue-card">
        <div class="icon">
            <div><img th:src="@{/assets/images/coffee-pot.svg}" alt=""></div>
        </div>
        <div class="monthly-content">
            <div class="total-earned">
                <h2>Total faturado</h2>
                <p>mês: abril</p>
                <h3>R$1.200,00</h3>
            </div>
            <div class="container">
                <div class="average-ticket"><p>ticket médio</p>
                    <p>R$79,00</p></div>
                <div class="highest-ticket"><p>maior pedido</p>
                    <p>R$109,00</p></div>
            </div>
        </div>
    </div>

    <div class="dish-status">
        <div class="late-dishes"><p>Pratos em atraso</p>div</div>
        <div class="in-prepare"><p>Pratos em preparo</p></div>
    </div>

    <div class="orders-graph">
        <div>
            <canvas id="myLineChart"></canvas>
        </div>
    </div>
</main>

</body>

<script>
    const ctx = document.getElementById('myLineChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'],
        datasets: [{
          label: 'Monthly Sales',
          data: [12, 19, 3, 5, 2],
          borderColor: 'rgb(75, 192, 192)',
          tension: 0.1 // Smooths the line
        }]
      }
    });
</script>
</html>
